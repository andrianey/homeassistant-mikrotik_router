name: Lint

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    name: Ruff + compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check custom_components
      - name: Compile check
        run: python -m compileall -q custom_components
