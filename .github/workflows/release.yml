name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync manifest version with tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting manifest version to $VERSION"
          python - <<'PY'
          import json, os
          path = "custom_components/mikrotik_router/manifest.json"
          version = os.environ["GITHUB_REF_NAME"].lstrip("v")
          with open(path, "r", encoding="utf-8") as f:
              data = json.load(f)
          data["version"] = version
          with open(path, "w", encoding="utf-8") as f:
              json.dump(data, f, indent=4)
              f.write("\n")
          PY

      - name: Build release zip
        run: |
          cd custom_components/mikrotik_router
          zip -r ../../mikrotik_router.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: mikrotik_router.zip
